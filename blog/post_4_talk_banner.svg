<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Talk to my portfolio — MCP server + embeddable AI widget">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06101F"/>
      <stop offset="1" stop-color="#0E1F3A"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#2E75B6" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#2E75B6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2E75B6"/>
      <stop offset="1" stop-color="#7DD3FC"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#122845"/>
      <stop offset="1" stop-color="#0E1F3A"/>
    </linearGradient>
    <pattern id="grid" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#7DD3FC" opacity="0.08"/>
    </pattern>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="8" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <ellipse cx="900" cy="120" rx="380" ry="240" fill="url(#glow)"/>
  <ellipse cx="200" cy="540" rx="300" ry="200" fill="url(#glow)" opacity="0.6"/>

  <!-- Top label / monogram -->
  <g transform="translate(64, 60)">
    <rect width="42" height="42" rx="10" fill="url(#accent)"/>
    <text x="21" y="28" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="800" fill="#06101F">NC</text>
    <text x="56" y="20" font-family="JetBrains Mono, monospace" font-size="11" letter-spacing="3" fill="#7DD3FC" text-transform="uppercase">PORTFOLIO · ENGINEERING NOTES</text>
    <text x="56" y="38" font-family="JetBrains Mono, monospace" font-size="11" letter-spacing="2" fill="#94A3B8">2026 · post 04</text>
  </g>

  <!-- Title block -->
  <g transform="translate(64, 180)">
    <text font-family="Inter, system-ui, sans-serif" font-size="62" font-weight="800" letter-spacing="-2" fill="#F1F5F9">
      <tspan x="0" y="0">Talk to my</tspan>
      <tspan x="0" y="72">portfolio.</tspan>
    </text>
    <text x="0" y="158" font-family="Source Serif 4, Georgia, serif" font-style="italic" font-size="22" fill="#94A3B8">An MCP server + embeddable AI widget</text>
    <text x="0" y="186" font-family="Source Serif 4, Georgia, serif" font-style="italic" font-size="22" fill="#94A3B8">grounded in real CV, projects, and 164 courses.</text>
  </g>

  <!-- Tag pills along the bottom -->
  <g transform="translate(64, 530)" font-family="JetBrains Mono, monospace" font-size="12" letter-spacing="1.5" fill="#7DD3FC">
    <g>
      <rect x="0" y="0" width="92" height="28" rx="14" fill="rgba(46,117,182,0.15)" stroke="rgba(46,117,182,0.4)"/>
      <text x="46" y="18" text-anchor="middle">MCP SDK</text>
    </g>
    <g transform="translate(104, 0)">
      <rect width="100" height="28" rx="14" fill="rgba(46,117,182,0.15)" stroke="rgba(46,117,182,0.4)"/>
      <text x="50" y="18" text-anchor="middle">NEXT.JS 16</text>
    </g>
    <g transform="translate(216, 0)">
      <rect width="118" height="28" rx="14" fill="rgba(46,117,182,0.15)" stroke="rgba(46,117,182,0.4)"/>
      <text x="59" y="18" text-anchor="middle">AI SDK v6</text>
    </g>
    <g transform="translate(346, 0)">
      <rect width="98" height="28" rx="14" fill="rgba(46,117,182,0.15)" stroke="rgba(46,117,182,0.4)"/>
      <text x="49" y="18" text-anchor="middle">PREACT</text>
    </g>
    <g transform="translate(456, 0)">
      <rect width="100" height="28" rx="14" fill="rgba(46,117,182,0.15)" stroke="rgba(46,117,182,0.4)"/>
      <text x="50" y="18" text-anchor="middle">VERCEL</text>
    </g>
  </g>

  <!-- Right side illustration: chat widget mockup -->
  <g transform="translate(740, 130)" filter="url(#softShadow)">
    <!-- Phone-like frame holding the widget -->
    <rect width="380" height="430" rx="22" fill="url(#card)" stroke="rgba(148,163,184,0.2)" stroke-width="1.5"/>

    <!-- Widget header -->
    <g transform="translate(0, 0)">
      <rect width="380" height="58" rx="22" fill="rgba(46,117,182,0.08)"/>
      <rect y="40" width="380" height="18" fill="rgba(46,117,182,0.08)"/>
      <line x1="0" y1="58" x2="380" y2="58" stroke="rgba(148,163,184,0.14)"/>
      <!-- Avatar -->
      <g transform="translate(18, 13)">
        <circle cx="16" cy="16" r="16" fill="url(#accent)"/>
        <circle cx="28" cy="28" r="5" fill="#06101F"/>
        <circle cx="28" cy="28" r="3.5" fill="#4ADE80"/>
        <!-- sparkle icon -->
        <path d="M16 8 L17 14 L23 16 L17 18 L16 24 L15 18 L9 16 L15 14 Z" fill="#06101F"/>
      </g>
      <text x="62" y="27" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#F1F5F9">Nery's portfolio</text>
      <text x="62" y="44" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#94A3B8">MCP-powered · grounded in real data</text>
      <g transform="translate(310, 18)">
        <rect width="54" height="22" rx="11" fill="rgba(74,222,128,0.12)" stroke="rgba(74,222,128,0.35)"/>
        <text x="27" y="15" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" letter-spacing="1" fill="#86EFAC">ONLINE</text>
      </g>
    </g>

    <!-- User bubble -->
    <g transform="translate(170, 88)">
      <rect width="190" height="46" rx="14" fill="#2E75B6"/>
      <text x="14" y="22" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#FFFFFF">what AI projects has</text>
      <text x="14" y="38" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#FFFFFF">he built?</text>
    </g>

    <!-- Assistant bubble -->
    <g transform="translate(18, 156)">
      <rect width="344" height="220" rx="14" fill="rgba(18,40,69,0.85)" stroke="rgba(148,163,184,0.14)"/>
      <text x="14" y="26" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#CBD5E1">Here are his 3 AI projects:</text>
      <!-- mock list -->
      <g font-family="Inter, system-ui, sans-serif" font-size="11" fill="#E2E8F0">
        <text x="14" y="56">1.</text>
        <text x="32" y="56" font-weight="700" fill="#F1F5F9">Research Agent</text>
        <text x="14" y="74" fill="#94A3B8">   Streaming ToolLoopAgent · cited Markdown</text>

        <text x="14" y="104">2.</text>
        <text x="32" y="104" font-weight="700" fill="#F1F5F9">Multi-Agent Code Reviewer</text>
        <text x="14" y="122" fill="#94A3B8">   Sec / Perf / Style + Sonnet supervisor</text>

        <text x="14" y="152">3.</text>
        <text x="32" y="152" font-weight="700" fill="#F1F5F9">RAG Agent with Memory</text>
        <text x="14" y="170" fill="#94A3B8">   pgvector · dual memory · zero-dep PDF</text>
      </g>
      <!-- mock inline code chip -->
      <g transform="translate(14, 184)">
        <rect width="74" height="20" rx="5" fill="rgba(46,117,182,0.2)" stroke="rgba(46,117,182,0.4)"/>
        <text x="37" y="14" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#7DD3FC">View demo →</text>
      </g>
      <g transform="translate(96, 184)">
        <rect width="74" height="20" rx="5" fill="rgba(46,117,182,0.2)" stroke="rgba(46,117,182,0.4)"/>
        <text x="37" y="14" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#7DD3FC">View code →</text>
      </g>
    </g>

    <!-- Input bar -->
    <g transform="translate(18, 388)">
      <rect width="344" height="34" rx="17" fill="rgba(18,40,69,0.6)" stroke="rgba(148,163,184,0.14)"/>
      <text x="14" y="22" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(148,163,184,0.7)">Ask about Nery's projects, skills, courses…</text>
      <circle cx="324" cy="17" r="13" fill="#2E75B6"/>
      <path d="M324 11 L324 23 M319 16 L324 11 L329 16" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>
  </g>

  <!-- FAB chip in corner -->
  <g transform="translate(1100, 580)" filter="url(#softShadow)">
    <circle cx="0" cy="0" r="28" fill="#2E75B6"/>
    <text x="0" y="6" text-anchor="middle" font-size="22">💬</text>
  </g>
</svg>
